<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌦️ weather API</title>
    <style>
        *{
            margin:0;
            padding: 0;
            font-family: 'Poppins',sans-serif;
            box-shadow: border-box;
        }
        body{
            background-image:url("https://i.pinimg.com/1200x/c8/30/17/c83017c255be137c08c568c3e284185a.jpg") ;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .card{
            width: 90%;
            max-width: 470px;
            background: linear-gradient(to bottom right,#85c4ff,#2f5ed5);
            color: #fff;
            margin: 100px auto 0;
            border-radius: 20px;
            padding: 40px 35px;
            text-align: center;
        }
        .search{
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search input{
            border: 0;
            outline: 0;
            background: white;
            color: #555;
            border-radius: 30px;
            padding: 10px 25px;
            height: 60px;
            margin-right: 16px;
            font-size: 18px;
            flex: 1;
        }
        .search button{
            border: 0;
            outline: 0;
            background: white;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            cursor: pointer;
           
        }
        .weather-icon{
            width: 170px;
            margin-top: 30px;
        }
        .weather h1{
            font-size: 80px;
            font-weight: 500;
        }
        .weather h2{
            font-size: 45px;
            font-weight: 400;
            margin-top: -10px;
        }
        .details{
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            margin-top: 50px;
        }
        .col{
            display: flex;
            align-items: center;
            text-align: left;
        }
        .col img{
            width: 85px;
            margin-right: 10px;
        }
        .humidity , .wind{
            font-size: 28px;
            margin-top: -6px;
        }

    </style>





</head>
<body>

    <div class="card">
        <div class="search">
            <input type="text" placeholder="city name ">
            <button><img src="images/WhatsApp Image 2026-05-15 at 02.51.34.jpeg" width="45px" height="45px"></button>
        </div>

        <div class="weather">
            <img src="images/rain-removebg-preview.png" class="weather-icon">
            <h1 class="temp">22°c</h1>
            <h2 class="city">Lucknow</h2>


            <div class="details">
                <div class="col">
                    <img src="images/humidity-removebg-preview.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind-removebg-preview.png" >
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>




        </div>

    </div>




<script>

const apiKey="19ee5e945aff6b382539e09a0e3df5ee";
const apiUrl="https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

const searchBox=document.querySelector(".search input");
const searchBtn=document.querySelector(".search button");
const weatherIcon = document.querySelector(".weather-icon");

async function checkW(city) {
    const response = await fetch(apiUrl + city + `&appid=${apiKey}`);
    var data = await response.json();

    console.log(data);

    document.querySelector(".city").innerHTML = data.name;
    document.querySelector(".temp").innerHTML = Math.round(data.main.temp)+"°c";
    document.querySelector(".humidity").innerHTML = data.main.humidity+"%";
    document.querySelector(".wind").innerHTML = data.wind.speed+" km/h";
    
    
    if(data.weather[0].main == "Clear"){
        weatherIcon.src="images/clear-removebg-preview.png";
    }
    else if(data.weather[0].main == "Clouds"){
        weatherIcon.src="images/cloud-removebg-preview.png";
    }
    else if(data.weather[0].main == "Rain"){
        weatherIcon.src="images/rain-removebg-preview.png";
    }
    else if(data.weather[0].main == "Drizzle"){
        weatherIcon.src="images/drizzle-removebg-preview.png";
    }
    else if(data.weather[0].main == "Mist"){
        weatherIcon.src="images/mist-removebg-preview.png";
    }
    else if(data.weather[0].main == "Snow"){
        weatherIcon.src="images/snow-removebg-preview.png";
    }
}

searchBtn.addEventListener("click",()=>{
    checkW(searchBox.value);

})


</script>
</body>
</html>
